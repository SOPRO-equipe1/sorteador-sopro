<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador Sopro - Participantes</title>
    <style>
        :root {
            --verde: #00EA6A;
            --azul: #0FB3FF;
            --laranja: #F97316;
            --branco: #FAFCFF;
            --preto: #1D252A;
            --cinza-fundo: #f0f4f8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--cinza-fundo);
            color: var(--preto);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding: 10px;
        }

        /* CONTAINER QUADRADO DINÂMICO SEM SCROLL */
        .container-sorteio {
            background: white;
            width: 95vh;
            height: 95vh;
            max-width: 100%;
            max-height: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(29, 37, 42, 0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            aspect-ratio: 1 / 1;
        }

        /* TOPO PARA LOGO */
        .header-logo {
            background: white;
            padding: 15px 10px 5px 10px;
            text-align: center;
            flex-shrink: 0;
        }

        .logo-container img {
            height: 40px;
            object-fit: contain;
        }

        /* ONDAS SENOIDAIS INFINITAS */
        .wave-divisor {
            width: 100%;
            height: 40px;
            line-height: 0;
            background: white;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .wave-divisor svg {
            position: absolute;
            width: 200%; 
            height: 100%;
            top: 0;
            left: 0;
        }

        .wave-back {
            fill: var(--azul);
            opacity: 0.75;
            animation: mover-onda-esquerda 10s linear infinite;
        }

        .wave-front {
            fill: var(--verde);
            animation: mover-onda-direita 7s linear infinite; 
        }

        @keyframes mover-onda-esquerda {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes mover-onda-direita {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }
        
        /* PAINEL CENTRAL CONTATO */
        .painel-central {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background: var(--branco);
            border-bottom: 1px solid #edf2f7;
            flex-shrink: 0;
        }

        .visor-resultado {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .visor-resultado span {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: #718096;
        }

        .numero-sorteado {
            width: 55px;
            height: 55px;
            border: 3px solid var(--azul);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 800;
            background: white;
            transition: all 0.2s ease;
        }

        .numero-sorteado.girando {
            color: var(--laranja);
            border-color: var(--laranja);
            animation: girando-efeito 0.1s infinite alternate;
        }

        .numero-sorteado.vencedor {
            color: white;
            background-color: var(--verde);
            border-color: var(--verde);
            animation: bounce-efeito 0.4s ease-out forwards;
        }

        @keyframes girando-efeito {
            from { transform: scale(0.95); }
            to { transform: scale(1.05); }
        }

        @keyframes bounce-efeito {
            0% { transform: scale(0.6); }
            100% { transform: scale(1); }
        }

        .btn-sortear {
            background: var(--laranja);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
            transition: all 0.3s ease;
        }

        .btn-sortear:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(249, 115, 22, 0.4);
        }

        .btn-sortear:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
        }

        
        .grid-rifa {
            display: grid;
            grid-template-columns: repeat(9, 1fr); 
            gap: 10px;
            padding: 20px 30px;
            background: white;
            flex-grow: 1;
            align-content: center; 
            overflow: hidden;      
        }

        .item-num {
            aspect-ratio: 1 / 1;
            background: white;
            border: 2px solid var(--verde); 
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: #334155;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            width: 100%;
        }

        .item-num.vencedor-grid {
            background-color: var(--verde) !important;
            color: white !important;
            border-color: var(--verde) !important;
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(0, 234, 106, 0.6);
            z-index: 10;
        }

        @media (max-height: 600px) {
            .grid-rifa { gap: 6px; padding: 10px; }
            .item-num { font-size: 0.9rem; }
            .header-logo { padding: 5px; }
            .wave-divisor { height: 25px; }
        }
    </style>
</head>
<body>

    <main class="container-sorteio">
        <header class="header-logo">
            <div class="logo-container">
                <img src="logo.png" alt="Logo Sopro" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 150 40\'><text x=\'10\' y=\'30\' fill=\'%231D252A\' font-family=\'sans-serif\' font-weight=\'bold\' font-size=\'28\'>Sopr<tspan fill=\'%2300EA6A\'>o</tspan></text></svg>'">
            </div>
        </header>

        <div class="wave-divisor">
            <svg viewBox="0 0 1200 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <path class="wave-layer wave-back" d="M 0 60 Q 300 120 600 60 T 1200 60 L 1200 0 L 0 0 Z"></path>
                <path class="wave-layer wave-front" d="M 0 40 Q 300 100 600 40 T 1200 40 L 1200 0 L 0 0 Z"></path>
            </svg>
        </div>

        <section class="painel-central">
            <div class="visor-resultado">
                <span>Resultado:</span>
                <div id="displayNumero" class="numero-sorteado">--</div>
            </div>
            <button id="btnSortear" class="btn-sortear">Sortear</button>
        </section>

        <section class="grid-rifa" id="gridRifa"></section>
    </main>

   <script>
        const gridRifa = document.getElementById('gridRifa');
        const displayNumero = document.getElementById('displayNumero');
        const btnSortear = document.getElementById('btnSortear');

        
        const numerosComprados = [
            2, 3, 4, 5, 6, 7, 10,
            11, 14, 15, 19, 20,
            21, 22, 23, 25, 27, 29,
            33, 34, 35, 36, 37, 40,
            42, 43, 44, 45, 46, 47, 50,
            53, 54, 55, 56,
            61, 64, 65, 66, 67, 68, 70,
            73, 77, 79, 80,
            81, 84, 86,
            91, 95, 98, 99, 100
        ];

        function gerarGradeExclusiva() {
            const fragment = document.createDocumentFragment();
            
            numerosComprados.forEach(numero => {
                const numCard = document.createElement('div');
                numCard.className = 'item-num';
                numCard.id = `n-${numero}`;
                numCard.textContent = numero;
                fragment.appendChild(numCard);
            });
            
            gridRifa.appendChild(fragment);
        }

        function iniciarSorteio() {
            if (numerosComprados.length === 0) return;

            btnSortear.disabled = true;
            document.querySelectorAll('.item-num').forEach(el => el.classList.remove('vencedor-grid'));
            displayNumero.className = 'numero-sorteado girando';

            let alternancias = 0;
            const maxAlternancias = 22;
            let velocidade = 50;

            function rodarRoleta() {
                const indexAleatorio = Math.floor(Math.random() * numerosComprados.length);
                displayNumero.textContent = numerosComprados[indexAleatorio];
                alternancias++;

                if (alternancias < maxAlternancias) {
                    velocidade += 15; 
                    setTimeout(rodarRoleta, velocidade);
                } else {
                    baterMartelo();
                }
            }

            function baterMartelo() {
                displayNumero.className = 'numero-sorteado vencedor';
                
                const indexVencedor = Math.floor(Math.random() * numerosComprados.length);
                const numeroVencedor = numerosComprados[indexVencedor];
                
                displayNumero.textContent = numeroVencedor;

                const elementoVencedor = document.getElementById(`n-${numeroVencedor}`);
                if (elementoVencedor) {
                    elementoVencedor.classList.add('vencedor-grid');
                }
                
                btnSortear.disabled = false;
            }

            rodarRoleta();
        }

        document.addEventListener('DOMContentLoaded', gerarGradeExclusiva);
        btnSortear.addEventListener('click', iniciarSorteio);
    </script>
</body>
</html>
